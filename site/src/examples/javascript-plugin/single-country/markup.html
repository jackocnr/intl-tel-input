<form id="form" class="validation-demo" noValidate>
  <label for="phone" class="form-label">Phone number (United States)</label>
  <div class="d-flex gap-2 align-items-start">
    <div class="demo-input-wrap position-relative">
      <div class="toast-container demo-toast-container">
        <div id="strictRejectToast" class="toast text-bg-primary" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="2000">
          <div class="d-flex">
            <div class="toast-body" id="strictRejectToastBody"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
          </div>
        </div>
      </div>
      <input
        id="phone"
        type="tel"
        class="form-control"
        name="phone"
        title="Enter your phone number"
        required
      />
      <div id="error-msg" class="invalid-feedback d-block"></div>
      <div id="valid-msg" class="valid-feedback d-block"></div>
    </div>
    <button class="btn btn-primary" id="btn" type="submit">Submit</button>
  </div>
</form>
