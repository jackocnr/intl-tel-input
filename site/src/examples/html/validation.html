<form id="validation-form" class="row g-2" noValidate>
  <div class="col-auto">
    <input
      id="phone"
      type="tel"
      class="form-control"
      name="phone"
      title="Enter your phone number"
      required
    />
    <div id="error-msg" class="invalid-feedback d-block"></div>
    <div id="valid-msg" class="valid-feedback d-block"></div>
  </div>
  <div class="col-auto">
    <button class="btn btn-primary" id="btn" type="submit">Submit</button>
  </div>
</form>
