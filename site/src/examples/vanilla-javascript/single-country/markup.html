<form id="form" class="validation-demo" noValidate>
  <div id="loading" class="d-flex align-items-center gap-2">
    <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
    <span>Detecting country&hellip;</span>
  </div>
  <div id="form-content" class="d-none">
    <label for="phone" class="form-label" id="phone-label">Phone number</label>
    <div class="d-flex gap-2">
      <div class="demo-input-wrap position-relative">
        <%= strictRejectToast("strictRejectToast") %>
        <input
          id="phone"
          type="tel"
          class="form-control"
          name="phone"
          title="Enter your phone number"
          required
        />
      </div>
      <button class="btn btn-primary" id="btn" type="submit">Submit</button>
    </div>
    <div id="error-msg" class="invalid-feedback d-block"></div>
    <div id="valid-msg" class="valid-feedback d-block"></div>
  </div>
</form>
