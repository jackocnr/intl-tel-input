<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>International Telephone Input</title>
    <link rel="stylesheet" href="dist/demo.css" />
    <script src="src/theme.js"></script>
  </head>

  <body>
    <h1>International Telephone Input</h1>
    <form id="form" novalidate>
      <div class="d-flex align-items-start gap-2">
        <div>
          <input id="phone" name="phone" type="tel" class="form-control" required />
          <div id="error-msg" class="invalid-feedback d-block"></div>
          <div id="valid-msg" class="valid-feedback d-block"></div>
        </div>
        <button class="btn btn-primary" id="btn" type="submit">Validate</button>
      </div>
    </form>

    <script src="../dist/js/intlTelInputWithUtils.js"></script>
    <script>
      const form = document.querySelector("#form");
      const input = document.querySelector("#phone");
      const errorMsg = document.querySelector("#error-msg");
      const validMsg = document.querySelector("#valid-msg");

      const iti = window.intlTelInput(input, {
        // allowDropdown: false,
        // allowedNumberTypes: ["TOLL_FREE"],
        // allowNumberExtensions: true,
        // allowPhonewords: true,
        // autoPlaceholder: "off",
        // containerClass: "test",
        // countryNameLocale: "ru",
        // countryOrder: ["jp", "kr"],
        // countrySearch: false,
        // customPlaceholder: function(selectedCountryPlaceholder, selectedCountryData) {
        //   return "e.g. " + selectedCountryPlaceholder;
        // },
        // dropdownContainer: document.querySelector('#custom-container'),
        // excludeCountries: ["us"],
        // fixDropdownWidth: false,
        // formatAsYouType: false,
        // formatOnDisplay: false,
        // geoIpLookup: function(success, failure) {
        //   fetch("https://ipapi.co/json")
        //     .then((res) => res.json())
        //     .then((data) => success(data.country_iso2))
        //     .catch(() => failure());
        // },
        // hiddenInput: () => ({ phone: "phone_full", country: "country_iso2" }),
        // i18n: { searchPlaceholder: "Custom search" },
        // initialCountry: "us",
        // loadUtils: () => import("/dist/js/utils.js"), // leading slash (and http-server) required for this to work in chrome
        // nationalMode: false,
        // onlyCountries: ['us', 'gb', 'ch', 'ca', 'do'],
        // placeholderNumberType: "MOBILE",
        // showFlags: false,
        // separateDialCode: true,
        // strictMode: true,
        // strictRejectAnimation: true,
        // useFullscreenPopup: true,
        searchInputClass: "form-control",
      });
      window.iti = iti; // useful for testing

      const getErrorMessage = (number, errorCode) => {
        if (!number) {
          return "Please enter a number";
        }
        const genericError = "Invalid number";
        const { validationError } = window.intlTelInput.utils;
        const errorMap = {
          [validationError.INVALID_COUNTRY_CODE]: "Invalid dial code",
          [validationError.TOO_SHORT]: "Too short",
          [validationError.TOO_LONG]: "Too long",
          [validationError.INVALID_LENGTH]: genericError,
        };
        return errorMap[errorCode] || genericError;
      };

      let showValidation = false;
      let submitted = false;

      const updateUI = () => {
        if (!showValidation) {
          return;
        }

        const value = input.value.trim();
        const isValid = Boolean(value) && iti.isValidNumber() === true;

        input.classList.toggle("is-valid", isValid);
        input.classList.toggle("is-invalid", !isValid);

        if (!isValid) {
          const errorCode = iti.getValidationError();
          errorMsg.textContent = getErrorMessage(value, errorCode);
        } else {
          errorMsg.textContent = "";
        }

        const showValid = Boolean(value) && isValid && submitted;
        validMsg.textContent = showValid ? "Full number: " + iti.getNumber() : "";
      };

      // on submit: validate (and show "Full number" if valid)
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        showValidation = true;
        submitted = true;
        updateUI();
      });

      // on blur: enable validation UI
      input.addEventListener("blur", () => {
        showValidation = true;
        updateUI();
      });

      // while typing / changing country: remove submitted state and update validity
      const handleUserInput = () => {
        submitted = false;
        updateUI();
      };

      input.addEventListener("input", handleUserInput);
    </script>
  </body>
</html>
