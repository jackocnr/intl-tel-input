<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>intl-tel-input fixture (narrow container)</title>
    <link rel="stylesheet" href="/packages/core/dist/css/intlTelInput.css" />
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; padding: 24px; }
      #phone { width: 100%; padding: 8px 10px; font-size: 16px; box-sizing: border-box; }
      .container { margin-top: 16px; width: 150px; }
    </style>
  </head>
  <body>
    <h1>Fixture</h1>
    <div class="container">
      <input id="phone" type="tel" />
    </div>

    <script src="/packages/core/dist/js/intlTelInputWithUtils.js"></script>
    <script>
      const input = document.querySelector('#phone');
      // Longest English country name: "Saint Vincent and the Grenadines"
      window.iti = window.intlTelInput(input, { initialCountry: "vc" });
    </script>
  </body>
</html>
